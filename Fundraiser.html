<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>WIC Ramadan Fundraiser</title>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>

<style>
  :root{
    --bg1:#070A12;
    --bg2:#0B1B3A;
    --card:#0E1630cc;
    --card2:#0E163099;
    --text:#EAF0FF;
    --muted:#B8C4E6;
    --accent:#6D5EF6;
    --accent2:#28D8A3;
    --warn:#FFB020;
    --danger:#FF4D6D;
    --stroke:rgba(255,255,255,.10);
    --shadow: 0 20px 70px rgba(0,0,0,.45);
    --radius: 28px;
  }

  * { box-sizing: border-box; }
  body{
    margin:0;
    min-height:100vh;
    color:var(--text);
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
    background:
      radial-gradient(1200px 600px at 15% 15%, rgba(109,94,246,.35), transparent 60%),
      radial-gradient(900px 550px at 85% 20%, rgba(40,216,163,.25), transparent 55%),
      radial-gradient(1000px 600px at 50% 100%, rgba(255,176,32,.12), transparent 60%),
      linear-gradient(180deg, var(--bg1), var(--bg2));
    overflow:hidden;
  }

  .wrap{
    height:100vh;
    padding: 36px;
    display:grid;
    grid-template-rows: auto 1fr auto;
    gap: 24px;
  }

  header{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap:16px;
  }

  .title{
    display:flex;
    flex-direction:column;
    gap: 10px;
  }

  h1{
    margin:0;
    font-size: clamp(30px, 3.2vw, 54px);
    letter-spacing: .2px;
    line-height: 1.05;
  }

  .subtitle{
    color:var(--muted);
    font-size: clamp(14px, 1.4vw, 20px);
    display:flex;
    gap: 10px;
    align-items:center;
    flex-wrap:wrap;
  }

  .pill{
    border: 1px solid var(--stroke);
    background: rgba(255,255,255,.06);
    padding: 6px 12px;
    border-radius: 999px;
    backdrop-filter: blur(10px);
  }

  .grid{
    display:grid;
    grid-template-columns: 1.1fr .9fr;
    gap: 24px;
    align-items:stretch;
    min-height: 0;
  }

  .card{
    border: 1px solid var(--stroke);
    background: linear-gradient(180deg, var(--card), var(--card2));
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 26px;
    position: relative;
    overflow:hidden;
    min-height: 0;
  }

  .card::before{
    content:"";
    position:absolute;
    inset:-1px;
    background:
      radial-gradient(600px 250px at 10% 0%, rgba(109,94,246,.25), transparent 55%),
      radial-gradient(500px 220px at 90% 10%, rgba(40,216,163,.18), transparent 55%);
    pointer-events:none;
    opacity:.9;
  }

  .card > *{ position: relative; z-index: 1; }

  .bigStat{
    display:flex;
    flex-direction:column;
    gap: 10px;
    margin-bottom: 18px;
  }

  .bigLabel{
    color:var(--muted);
    font-size: clamp(14px, 1.5vw, 20px);
    letter-spacing:.2px;
  }

  .bigNumber{
    font-size: clamp(48px, 5vw, 92px);
    font-weight: 800;
    line-height: 1;
    letter-spacing: .4px;
  }

  .goalLine{
    display:flex;
    gap: 16px;
    align-items: baseline;
    flex-wrap:wrap;
    margin-top: 6px;
  }
  .goalLine .pct{
    font-weight:800;
    font-size: clamp(18px, 2vw, 30px);
    color: #DDE6FF;
  }
  .goalLine .goal{
    color: var(--muted);
    font-size: clamp(14px, 1.5vw, 20px);
  }

  .kpis{
    display:grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 14px;
    margin-top: 18px;
  }

  .kpi{
    border: 1px solid var(--stroke);
    background: rgba(255,255,255,.05);
    border-radius: 18px;
    padding: 14px 16px;
  }
  .kpi .klabel{
    color: var(--muted);
    font-size: clamp(12px, 1.2vw, 16px);
    margin-bottom: 6px;
  }
  .kpi .kval{
    font-weight: 800;
    font-size: clamp(22px, 2.2vw, 34px);
    letter-spacing:.2px;
  }

  .rightCol{
    display:grid;
    grid-template-rows: 1fr auto;
    gap: 24px;
    min-height: 0;
  }

  .chartBox{
    display:grid;
    place-items:center;
    min-height: 0;
  }

  canvas{
    max-width: 100%;
    max-height: 100%;
  }

  .mini{
    display:flex;
    justify-content:space-between;
    gap: 14px;
    flex-wrap:wrap;
    align-items:center;
    color: var(--muted);
    font-size: clamp(12px, 1.2vw, 16px);
  }

  .statusDot{
    display:inline-block;
    width:10px;height:10px;border-radius:50%;
    background: var(--accent2);
    box-shadow: 0 0 0 6px rgba(40,216,163,.15);
    margin-right: 8px;
    vertical-align: middle;
  }

  .error{
    color: #ffd1d8;
  }

  footer{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap: 12px;
    color: rgba(255,255,255,.55);
    font-size: 13px;
    padding: 0 4px;
  }

  ::-webkit-scrollbar{ width: 0; height:0; }
</style>
</head>

<body>
<div class="wrap">
  <header>
    <div class="title">
      <h1>WIC Ramadan Fundraiser 2026</h1>
      <div class="subtitle">
        <span class="pill">Live progress</span>
       
        <span class="pill">Goal: <strong id="goalPill"></strong></span>
      </div>
    </div>

    <div class="subtitle">
      <span id="health"><span class="statusDot"></span>Connected</span>
    </div>
  </header>

  <div class="grid">
    <!-- Left -->
    <section class="card">
      <div class="bigStat">
        <div class="bigLabel">Total Raised</div>
        <div class="bigNumber" id="raised">$0</div>

        <div class="goalLine">
          <div class="pct" id="pct">0%</div>
          <div class="goal">of <span id="goal">$0</span> goal</div>
        </div>
      </div>

      <div class="kpis">
        <div class="kpi">
          <div class="klabel">Contributors</div>
          <div class="kval" id="contributors">0</div>
        </div>
        <div class="kpi">
          <div class="klabel">Pledgers</div>
          <div class="kval" id="pledgers">0</div>
        </div>
        <div class="kpi">
          <div class="klabel">Remaining</div>
          <div class="kval" id="remaining">$0</div>
        </div>
      </div>

      <div>
       
       <!-- <img src="barcode.png" style="height: 256px; margin-top: 24px; margin-left: 240px; opacity: .8;"  />-->
      </div>
    </section>

    <!-- Right -->
    <section class="rightCol">
      <div class="card chartBox">
        <canvas id="donut"></canvas>
      </div>

      <div class="card">
        <div class="mini">
          <div>
            <span id="updatedLabel">Last updated: --</span>
            <span id="err" class="error"></span>
          </div>
          <div class="pill">Auto-refresh: <strong id="refreshLabel"></strong></div>
        </div>
      </div>
    </section>
  </div>

  <footer>
   
  </footer>
</div>

<script>
  // =========================
  // CONFIG
  // =========================
  const CONFIG = {
    campaignId: 2313,
    refreshMs: 30000, // 30s
    // Your published JSON
    statusUrl: "https://sheikhnobi.github.io/status.json"
  };

  
  document.getElementById("refreshLabel").textContent = (CONFIG.refreshMs/1000) + "s";

  const money = (n) => new Intl.NumberFormat("en-US", { style:"currency", currency:"USD", maximumFractionDigits: 0 }).format(n);
  const num = (n) => new Intl.NumberFormat("en-US").format(n);

  // Chart setup
  const ctx = document.getElementById("donut");
  const donutChart = new Chart(ctx, {
    type: "doughnut",
    data: {
      labels: ["Raised", "Remaining"],
      datasets: [{
        data: [0, 1],
        borderWidth: 0,
        hoverOffset: 8,
        backgroundColor: [
          "rgba(109, 94, 246, 0.95)",
          "rgba(255, 255, 255, 0.10)"
        ]
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: "72%",
      plugins: {
        legend: {
          display: true,
          labels: {
            color: "rgba(234, 240, 255, 0.85)",
            boxWidth: 16,
            padding: 16,
            font: { size: 16, weight: "700" }
          }
        },
        tooltip: {
          callbacks: {
            label: (context) => `${context.label}: ${money(context.parsed)}`
          }
        }
      }
    }
  });

  function sizeChartBox() {
    const chartCard = ctx.closest(".card");
    chartCard.style.height = Math.max(360, window.innerHeight * 0.58) + "px";
  }
  window.addEventListener("resize", sizeChartBox);
  sizeChartBox();

  function setHealth(ok, message) {
    const el = document.getElementById("health");
    const dot = ok
      ? '<span class="statusDot"></span>'
      : '<span class="statusDot" style="background: var(--danger); box-shadow: 0 0 0 6px rgba(255,77,109,.15)"></span>';
    el.innerHTML = `${dot}${message}`;
  }

  function formatUpdatedFromJson(updatedUtcIso) {
    // If your PS job stops, this time will stop moving — very useful.
    if (!updatedUtcIso) return null;
    const d = new Date(updatedUtcIso);
    if (isNaN(d.getTime())) return null;
    return d.toLocaleString([], { hour: '2-digit', minute: '2-digit', month: 'short', day: '2-digit' });
  }

  async function load() {
    document.getElementById("err").textContent = "";

    try {
      // cache-buster to reduce GitHub Pages caching
      const url = `${CONFIG.statusUrl}?ts=${Date.now()}`;
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const det = await res.json();
      if (det.error) throw new Error(det.error);

      // Expecting keys produced by your PowerShell:
      // raised, goal, remaining, pct, contributors, pledgers, updated_utc
      const raised = Number(det.raised) || 0;
      const goal = Number(det.goal) || 0;
      const remaining = ("remaining" in det) ? (Number(det.remaining) || 0) : Math.max(0, goal - raised);
      const contributors = Number(det.contributors) || 0;
      const pledgers = Number(det.pledgers) || 0;

      let pct = Number(det.pct);
      if (!isFinite(pct) || pct <= 0) {
        pct = goal > 0 ? (raised / goal) * 100 : 0;
      }

      // Update UI
      document.getElementById("raised").textContent = money(raised);
      document.getElementById("contributors").textContent = num(contributors);
      document.getElementById("pledgers").textContent = num(pledgers);
      document.getElementById("pct").textContent = `${Math.min(100, pct).toFixed(0)}%`;

      document.getElementById("goal").textContent = money(goal);
      document.getElementById("goalPill").textContent = money(goal);
      document.getElementById("remaining").textContent = money(remaining);

      // Update chart
      donutChart.data.datasets[0].data = [raised, remaining];
      donutChart.update();

      // Last updated (from JSON)
      const updatedLabel = formatUpdatedFromJson(det.updated_utc);
      document.getElementById("updatedLabel").textContent =
        updatedLabel ? `Last updated: ${updatedLabel}` : "Last updated: --";

      setHealth(true, "Connected");
    } catch (e) {
      setHealth(false, "Connection issue");
      document.getElementById("err").textContent = ` • ${e.message}`;
    }
  }

  load();
  setInterval(load, CONFIG.refreshMs);
</script>
</body>
</html>
