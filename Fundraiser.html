<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>WIC TV Dashboard</title>

  <style>
    :root{
      --bg0:#070A12;
      --bg1:#0B1020;
      --stroke:rgba(255,255,255,.10);
      --muted:rgba(255,255,255,.70);
      --muted2:rgba(255,255,255,.55);
      --text:#F6F7FB;
      --glow: 0 20px 70px rgba(0,0,0,.55);
    }

    *{box-sizing:border-box}
    html,body{height:100%; margin:0}

    body{
      color:var(--text);
      background:
        radial-gradient(1200px 800px at 15% 10%, rgba(88,101,242,.22), transparent 60%),
        radial-gradient(1200px 800px at 85% 15%, rgba(52,211,153,.18), transparent 60%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      overflow:hidden;
    }

    /* ===================== TV SCALE ===================== */
    #tvScale{
      --tv-scale: .90;   /* default zoom level */
      transform: scale(var(--tv-scale));
      transform-origin: top left;
      width: calc(100% / var(--tv-scale));
      height: calc(100% / var(--tv-scale));
    }

    .wrap{
      height:100%;
      padding: clamp(18px, 2.2vw, 40px);
      display:flex;
      flex-direction:column;
      gap: clamp(12px, 1.4vw, 22px);
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 18px;
      padding: 18px 24px;
      border:1px solid var(--stroke);
      border-radius:18px;
      background:rgba(255,255,255,.04);
      box-shadow:var(--glow);
    }

    .brand{display:flex;gap:14px;align-items:baseline}
    .brand h1{
      margin:0;
      font-size:36px;
      font-weight:800;
      letter-spacing:.2px;
    }

    .pill{
      padding:6px 12px;
      border-radius:999px;
      border:1px solid var(--stroke);
      background:rgba(255,255,255,.06);
      color:var(--muted);
      font-size:14px;
      white-space:nowrap;
    }

    .meta{
      display:flex;gap:12px;align-items:center;color:var(--muted2);
      font-size:14px;
      white-space:nowrap;
    }
    .dot{
      width:10px;height:10px;border-radius:50%;
      background:#fbbf24;
      box-shadow:0 0 0 6px rgba(251,191,36,.12);
    }
    .dot.ok{background:#34d399;box-shadow:0 0 0 6px rgba(52,211,153,.12)}
    .dot.bad{background:#fb7185;box-shadow:0 0 0 6px rgba(251,113,133,.12)}

    .grid{
      flex:1;
      display:grid;
      grid-template-columns: 1.2fr .8fr;
      gap:22px;
      min-height:0;
    }

    .cards{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:22px;
      min-height:0;
    }

    .card{
      border:1px solid var(--stroke);
      border-radius:22px;
      background:rgba(255,255,255,.05);
      padding:24px;
      box-shadow:var(--glow);
      display:flex;
      flex-direction:column;
      gap:14px;
      min-height:0;
    }

    .cardHead{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:14px;
    }

    .card h3{
      margin:0;
      font-size:22px;
      font-weight:750;
      letter-spacing:.2px;
    }

    .badge{
      align-self:flex-start;
      padding:6px 12px;
      border-radius:999px;
      border:1px solid var(--stroke);
      background:rgba(0,0,0,.25);
      color:var(--muted);
      font-size:14px;
      white-space:nowrap;
    }

    .value{
      font-size:48px;
      font-weight:900;
      letter-spacing:.2px;
      line-height:1.05;
    }

    .statRow{
      display:flex;
      justify-content:space-between;
      gap:12px;
      color:var(--muted2);
      font-size:16px;
    }

    .bar{
      height:18px;
      border-radius:999px;
      border:1px solid var(--stroke);
      background:rgba(255,255,255,.05);
      overflow:hidden;
    }

    .bar > div{
      height:100%;
      width:0%;
      transition:width .7s ease;
      border-radius:999px;
    }

    .bar.op > div{background:linear-gradient(90deg,#5865f2,#818cf8)}
    .bar.en > div{background:linear-gradient(90deg,#34d399,#6ee7b7)}

    /* Right panel thermometer */
    .panel{
      border:1px solid var(--stroke);
      border-radius:22px;
      background:rgba(255,255,255,.04);
      padding:24px;
      box-shadow:var(--glow);
      display:flex;
      flex-direction:column;
      gap:18px;
      min-height:0;
    }

    .panel h2{
      margin:0;
      font-size:20px;
      font-weight:800;
      letter-spacing:.2px;
    }

    .trackCard{
      border:1px solid var(--stroke);
      border-radius:16px;
      padding:16px 18px;
      background:rgba(255,255,255,.04);
    }

    .trackTop{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:baseline;
      color:var(--muted);
    }
    .trackTop .name{font-weight:800; color:var(--text)}
    .trackTop .pct{white-space:nowrap}

    .thermo{
      margin-top:10px;
      height:24px;
      border-radius:999px;
      border:1px solid var(--stroke);
      background:rgba(255,255,255,.05);
      overflow:hidden;
    }

    .fill{
      height:100%;
      width:0%;
      transition:width .7s ease;
      border-radius:999px;
    }

    .fill.op{background:linear-gradient(90deg,#5865f2,#818cf8)}
    .fill.en{background:linear-gradient(90deg,#34d399,#6ee7b7)}

    .thermoMeta{
      margin-top:10px;
      display:flex;
      justify-content:space-between;
      gap:12px;
      color:var(--muted2);
      font-size:14px;
    }

    .footer{
      margin-top:auto;
      text-align:right;
      font-size:14px;
      color:var(--muted2);
    }
  </style>
</head>

<body>
  <div id="tvScale">
    <div class="wrap">

      <div class="topbar">
        <div class="brand">
          <h1>WIC Campaign Status</h1>
          <div class="pill">TV Mode • Auto refresh</div>
        </div>
        <div class="meta">
          <span class="dot" id="healthDot"></span>
          <span id="healthText">Loading…</span>
          <span>•</span>
          <span id="lastUpdated">—</span>
        </div>
      </div>

      <div class="grid">

        <div class="cards">
          <!-- Operational -->
          <div class="card">
            <div class="cardHead">
              <h3 id="opName">Operational</h3>
              <div class="badge" id="opGoal">Goal —</div>
            </div>
            <div class="value" id="opRaised">$—</div>
            <div class="statRow">
              <span id="opRemaining">Remaining —</span>
              <span id="opPct">—%</span>
            </div>
            <div class="bar op"><div id="opBar"></div></div>
          </div>

          <!-- Endowment -->
          <div class="card">
            <div class="cardHead">
              <h3 id="enName">Endowment</h3>
              <div class="badge" id="enGoal">Goal —</div>
            </div>
            <div class="value" id="enRaised">$—</div>
            <div class="statRow">
              <span id="enRemaining">Remaining —</span>
              <span id="enPct">—%</span>
            </div>
            <div class="bar en"><div id="enBar"></div></div>
          </div>
        </div>

        <!-- Right Panel -->
        <div class="panel">
          <h2>Filled vs Remaining</h2>

          <div class="trackCard">
            <div class="trackTop">
              <div class="name" id="opTrackName">Operational</div>
              <div class="pct" id="opTrackPct">—%</div>
            </div>
            <div class="thermo"><div class="fill op" id="opThermo"></div></div>
            <div class="thermoMeta">
              <span id="opMetaFilled">Filled: —</span>
              <span id="opMetaRemain">Remaining: —</span>
            </div>
          </div>

          <div class="trackCard">
            <div class="trackTop">
              <div class="name" id="enTrackName">Endowment</div>
              <div class="pct" id="enTrackPct">—%</div>
            </div>
            <div class="thermo"><div class="fill en" id="enThermo"></div></div>
            <div class="thermoMeta">
              <span id="enMetaFilled">Filled: —</span>
              <span id="enMetaRemain">Remaining: —</span>
            </div>
          </div>

          <div class="footer">Source: status.json</div>
        </div>

      </div>
    </div>
  </div>

  <script>
    const STATUS_URL = "https://sheikhnobi.github.io/status.json";
    const REFRESH_MS = 30_000;

    // Optional: allow URL override, e.g. ?scale=0.88
    (() => {
      const sp = new URLSearchParams(location.search);
      const s = Number(sp.get("scale"));
      if (Number.isFinite(s) && s > 0.5 && s < 1.2) {
        document.getElementById("tvScale").style.setProperty("--tv-scale", String(s));
      }
    })();

    const $ = (id) => document.getElementById(id);

    function setHealth(state, msg){
      const dot = $("healthDot");
      dot.classList.remove("ok","bad");
      if (state === "ok") dot.classList.add("ok");
      if (state === "bad") dot.classList.add("bad");
      $("healthText").textContent = msg;
    }

    function toNumber(x){
      if (x === null || x === undefined) return NaN;
      if (typeof x === "number") return x;
      if (typeof x === "string"){
        const cleaned = x.replace(/[$,]/g,"").trim();
        const n = Number(cleaned);
        return Number.isFinite(n) ? n : NaN;
      }
      return NaN;
    }

    function money(n){
      if (!Number.isFinite(n)) return "—";
      return n.toLocaleString(undefined, { style:"currency", currency:"USD", maximumFractionDigits:0 });
    }

    function pct(raised, goal){
      if (!Number.isFinite(raised) || !Number.isFinite(goal) || goal <= 0) return NaN;
      return Math.max(0, Math.min(100, (raised / goal) * 100));
    }

    // Accept multiple shapes:
    // - { operational: {...}, endowment: {...} }
    // - { campaigns: { operational: {...}, endowment: {...} } }
    // - { campaigns: [ {id:"operational", ...}, {id:"endowment", ...} ] }
    function pickCampaign(data, key){
      if (!data) return null;

      if (data[key] && typeof data[key] === "object") return data[key];

      if (data.campaigns && data.campaigns[key] && typeof data.campaigns[key] === "object") {
        return data.campaigns[key];
      }

      if (Array.isArray(data.campaigns)) {
        const found = data.campaigns.find(c => {
          const k = (c.id || c.key || c.slug || c.name || "").toString().toLowerCase();
          return k === key;
        });
        if (found) return found;
      }

      return null;
    }

    function readFields(c){
      const name = c.title || c.name || c.displayName || "";
      const goal = toNumber(c.goal ?? c.target ?? c.total ?? c.totalGoal);
      const raised = toNumber(c.raised ?? c.filled ?? c.collected ?? c.current ?? c.amountRaised);

      let remaining = toNumber(c.remaining ?? c.left ?? c.amountRemaining);
      if (!Number.isFinite(remaining) && Number.isFinite(goal) && Number.isFinite(raised)) {
        remaining = Math.max(0, goal - raised);
      }
      return { name, goal, raised, remaining };
    }

    function render(prefix, fields, fallbackName){
      const name = fields.name || fallbackName;
      const goal = fields.goal;
      const raised = fields.raised;
      const remaining = fields.remaining;

      const p = pct(raised, goal);
      const pText = Number.isFinite(p) ? `${p.toFixed(1)}%` : "—%";
      const pWidth = Number.isFinite(p) ? `${p}%` : "0%";

      $(prefix+"Name").textContent = name;
      $(prefix+"Goal").textContent = Number.isFinite(goal) ? `Goal ${money(goal)}` : "Goal —";
      $(prefix+"Raised").textContent = money(raised);

      $(prefix+"Remaining").textContent =
        Number.isFinite(remaining) ? `Remaining ${money(remaining)}` : "Remaining —";

      $(prefix+"Pct").textContent = pText;
      $(prefix+"Bar").style.width = pWidth;
      $(prefix+"Thermo").style.width = pWidth;

      if (prefix === "op"){
        $("opTrackName").textContent = name;
        $("opTrackPct").textContent = pText;
        $("opMetaFilled").textContent = `Filled: ${money(raised)}`;
        $("opMetaRemain").textContent = `Remaining: ${money(remaining)}`;
      } else {
        $("enTrackName").textContent = name;
        $("enTrackPct").textContent = pText;
        $("enMetaFilled").textContent = `Filled: ${money(raised)}`;
        $("enMetaRemain").textContent = `Remaining: ${money(remaining)}`;
      }
    }

    async function load(){
      try{
        setHealth("warn", "Refreshing…");

        const res = await fetch(STATUS_URL, { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const data = await res.json();

        const opRaw = pickCampaign(data, "operational");
        const enRaw = pickCampaign(data, "endowment");

        if (!opRaw && !enRaw){
          setHealth("bad", "No campaigns found");
          $("lastUpdated").textContent = "—";
          return;
        }

        if (opRaw) render("op", readFields(opRaw), "Operational");
        if (enRaw) render("en", readFields(enRaw), "Endowment");

        // Prefer payload timestamp if available
        const ts = data.lastUpdated || data.updatedAt || data.timestamp || null;
        const when = ts ? new Date(ts) : new Date();
        $("lastUpdated").textContent = `Last updated: ${when.toLocaleString()}`;

        // If one is missing, show partial but warn
        if (!opRaw || !enRaw) setHealth("bad", "Missing one campaign");
        else setHealth("ok", "Live");
      } catch (e){
        console.error(e);
        setHealth("bad", "Offline / fetch error");
        $("lastUpdated").textContent = "—";
      }
    }

    load();
    setInterval(load, REFRESH_MS);
  </script>
</body>
</html>
